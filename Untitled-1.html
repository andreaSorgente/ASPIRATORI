<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Selezionatore Aspiratore</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 12px;
      margin: 8px 0;
      width: 100%;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #007AFF;
      color: white;
      border: none;
      font-weight: bold;
    }

    #risultato {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    #loading {
      text-align: center;
      color: gray;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Selezionatore Aspiratore</h2>

  <div id="loading">Caricamento dati...</div>

  <label>Portata (m³/h):</label>
  <input type="number" id="portata">

  <label>Perdita di carico (mmH₂O):</label>
  <input type="number" id="prevalenza">

  <button onclick="trova()">Trova aspiratore</button>

  <p id="risultato">L'aspiratore apparirà qui</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let data = [];
let headers = [];

// 🔥 Caricamento automatico Excel
async function caricaExcel() {
  try {
    const response = await fetch("ventilatori.xlsx");
    const arrayBuffer = await response.arrayBuffer();

    const workbook = XLSX.read(arrayBuffer);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    data = XLSX.utils.sheet_to_json(sheet);

    headers = Object.keys(data[0]).map((h, i) => {
      if (i === 0) return "Ventilatore";
      return Number(h);
    });

    document.getElementById("loading").innerText = "Dati caricati ✅";

  } catch (error) {
    document.getElementById("loading").innerText =
      "Errore caricamento Excel ❌";
    console.error(error);
  }
}

// 🔍 Funzione principale (traduzione Python)
function trova() {
  let portata = parseFloat(document.getElementById('portata').value);
  let prevalenza = parseFloat(document.getElementById('prevalenza').value);

  if (isNaN(portata) || isNaN(prevalenza)) {
    alert("Inserisci numeri validi!");
    return;
  }

  if (data.length === 0) {
    alert("Dati non ancora caricati!");
    return;
  }

  let colonne = headers.slice(1);

  // Trova colonna più vicina
  let colonna = colonne.reduce((prev, curr) =>
    Math.abs(curr - portata) < Math.abs(prev - portata) ? curr : prev
  );

  // Trova riga corretta
  let candidati = data
    .map(row => ({
      val: row[colonna] - prevalenza,
      nome: row["Ventilatore"]
    }))
    .filter(x => x.val >= 0);

  if (candidati.length === 0) {
    document.getElementById("risultato").innerText =
      "Nessun aspiratore trovato";
    return;
  }

  let risultato = candidati.reduce((prev, curr) =>
    Math.abs(curr.val) < Math.abs(prev.val) ? curr : prev
  );

  document.getElementById("risultato").innerText =
    "Aspiratore mod: " + risultato.nome;
}

// avvio automatico
caricaExcel();
</script>

</body>
</html>
